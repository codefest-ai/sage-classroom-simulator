services:
  - type: web
    name: sage-simulator
    runtime: python
    buildCommand: ""
    startCommand: python3 server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ZOOM_WEBHOOK_SECRET
        sync: false
      - key: PORT
        value: 10000
